---
- name: Päivitä apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Asenna peruspaketit
  apt:
    name:
      - curl
      - wget
      - git
      - ufw
      - unattended-upgrades
      - apt-transport-https
      - ca-certificates
    state: present

- name: Aseta UFW oletuspolitiikka
  ufw:
    policy: deny
    direction: incoming

- name: Salli SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Ota UFW käyttöön
  ufw:
    state: enabled

- name: Asenna NFS-client
  apt:
    name: nfs-common
    state: present

- name: Luo media-hakemisto
  file:
    path: /media
    state: directory
    mode: '0755'

- name: Mounttaa NFS pysyvästi
  mount:
    path: /media
    src: 192.168.1.50:/mnt/media
    fstype: nfs
    opts: defaults,_netdev
    state: mounted